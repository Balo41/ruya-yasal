<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Bağlantı Kodu — Rüya Anahtarı</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;max-width:640px;margin:0 auto;
       padding:48px 20px;line-height:1.6;color:#1a1a2e;background:#faf9ff;text-align:center}
  h2{color:#3a2a6a}
  textarea{width:92%;height:90px;font-size:15px;padding:10px;border:2px solid #c9b8ff;
           border-radius:10px;margin-top:12px;word-break:break-all}
  button{margin-top:14px;padding:12px 28px;background:#6a4ad0;color:#fff;border:0;
         border-radius:10px;font-size:16px;cursor:pointer}
  .ok{color:#2a8a4a;font-weight:bold;margin-top:10px;display:none}
</style>
</head>
<body>
<h2>🌙 TikTok bağlantısı alındı</h2>
<p>Aşağıdaki kodu <strong>kopyala</strong> ve sohbete yapıştır:</p>
<textarea id="code" readonly></textarea>
<br>
<button onclick="kopyala()">Kodu Kopyala</button>
<div class="ok" id="ok">Kopyalandı ✓</div>
<script>
  // Adres çubuğundaki ?code=... parametresini al ve göster
  const p = new URLSearchParams(window.location.search);
  const kod = p.get('code');
  const ta = document.getElementById('code');
  ta.value = kod ? kod : ('HATA: ' + (p.get('error_description') || p.get('error') || 'kod bulunamadı'));
  function kopyala(){
    ta.select(); document.execCommand('copy');
    document.getElementById('ok').style.display = 'block';
  }
</script>
</body>
</html>
